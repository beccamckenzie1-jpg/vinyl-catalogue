<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Catalogue — Vinyl Collection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1208; --cream: #f5f0e8; --warm: #e8dfc8; --groove: #2a1f0e;
    --label-red: #c0392b; --muted: #7a6e5f; --border: rgba(26,18,8,0.15); --card-bg: #fffef9;
  }
  body { font-family: 'DM Mono', monospace; background: var(--cream); color: var(--ink); min-height: 100vh; }
  .app { max-width: 680px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header::after { content: ''; display: block; height: 1px; background: linear-gradient(to right, transparent, var(--ink), transparent); margin-top: 1.5rem; opacity: 0.2; }
  .record-icon { width: 56px; height: 56px; margin: 0 auto 1rem; border-radius: 50%; background: var(--groove); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 4px var(--warm), 0 0 0 8px rgba(26,18,8,0.08); }
  .record-icon::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--cream); }
  h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; letter-spacing: -0.02em; color: var(--groove); }
  .subtitle { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 0.25rem; }
  .sync-status { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: var(--muted); margin-top: 0.75rem; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .sync-dot.ok { background: #2e7d32; }
  .sync-dot.err { background: var(--label-red); }
  .sync-dot.busy { animation: pulse 1s ease-in-out infinite; background: #d4820a; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .stats-row { display: flex; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
  .stat { flex: 1; background: var(--card-bg); padding: 0.75rem 1rem; text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--groove); }
  .stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .search-bar { position: relative; margin-bottom: 1.25rem; }
  .search-bar input { width: 100%; padding: 0.875rem 1rem 0.875rem 2.75rem; font-family: 'DM Mono', monospace; font-size: 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--ink); outline: none; }
  .search-bar svg { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); opacity: 0.35; pointer-events: none; }
  .action-row { display: flex; gap: 8px; margin-bottom: 2rem; }
  .btn { flex: 1; padding: 0.75rem 0.5rem; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.05em; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--ink); transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .btn:hover { background: var(--warm); border-color: rgba(26,18,8,0.3); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--groove); color: var(--cream); border-color: var(--groove); }
  .btn.primary:hover { background: #1a1208; }
  .btn-icon { font-size: 20px; line-height: 1; }
  .btn-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.8; }
  .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1.25rem; }
  .panel-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
  .close-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; padding: 0; }
  .panel-body { padding: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
  .form-group input, .form-group textarea { width: 100%; padding: 0.625rem 0.875rem; font-family: 'DM Mono', monospace; font-size: 13px; background: var(--cream); border: 1px solid var(--border); border-radius: 6px; color: var(--ink); outline: none; }
  .form-group textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .form-group input:focus, .form-group textarea:focus { border-color: rgba(26,18,8,0.4); background: #fff; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .submit-btn { width: 100%; padding: 0.75rem; margin-top: 1.25rem; font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.06em; background: var(--groove); color: var(--cream); border: none; border-radius: 8px; cursor: pointer; }
  .submit-btn:hover { background: #1a1208; }

  /* Barcode input row */
  .barcode-input-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .barcode-input-row input { flex: 1; padding: 0.625rem 0.875rem; font-family: 'DM Mono', monospace; font-size: 13px; background: var(--cream); border: 1px solid var(--border); border-radius: 6px; color: var(--ink); outline: none; }
  .barcode-input-row input:focus { border-color: rgba(26,18,8,0.4); background: #fff; }
  .barcode-lookup-btn { padding: 0.625rem 1rem; font-family: 'DM Mono', monospace; font-size: 12px; background: var(--groove); color: var(--cream); border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .barcode-lookup-btn:hover { background: #1a1208; }
  .barcode-divider { text-align: center; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 1rem 0; display: flex; align-items: center; gap: 10px; }
  .barcode-divider::before, .barcode-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Autocomplete */
  .ac-wrap { position: relative; }
  .ac-dropdown { display: none; position: absolute; top: calc(100% + 2px); left: 0; right: 0; z-index: 9999; background: var(--card-bg); border: 1px solid rgba(26,18,8,0.3); border-radius: 6px; max-height: 200px; overflow-y: auto; box-shadow: 0 6px 20px rgba(26,18,8,0.15); }
  .ac-dropdown.open { display: block; }
  .ac-item { padding: 0.7rem 0.875rem; font-size: 13px; font-family: 'DM Mono', monospace; color: var(--ink); cursor: pointer; border-bottom: 1px solid var(--border); }
  .ac-item:last-child { border-bottom: none; }
  .ac-item.highlighted, .ac-item:hover { background: var(--warm); }

  #scanner-wrap { position: relative; background: #000; border-radius: 8px; overflow: hidden; width: 100%; aspect-ratio: 4/3; margin-bottom: 1rem; }
  #scanner-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 72%; height: 28%; border: 2px solid rgba(255,255,255,0.7); border-radius: 4px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none; }
  .scanner-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--label-red); animation: scan 2s ease-in-out infinite; }
  @keyframes scan { 0%,100%{top:8%} 50%{top:88%} }
  .scanner-status { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 0.75rem; min-height: 20px; }

  /* Sort bar */
  .sort-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
  .sort-bar span { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); flex: 1; }
  .sort-btn { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--muted); }
  .sort-btn.active { background: var(--groove); color: var(--cream); border-color: var(--groove); }

  .record-item { display: flex; align-items: flex-start; gap: 1rem; padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .record-item:last-child { border-bottom: none; }
  .record-item:hover { background: #faf8f3; }
  .disc-icon { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
  .disc-icon::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--cream); }
  .disc-icon.c1{background:#8B2635}.disc-icon.c2{background:#1a3a5c}.disc-icon.c3{background:#2d5a27}.disc-icon.c4{background:#5a3a1a}.disc-icon.c5{background:#3a1a5a}
  .record-info { flex: 1; min-width: 0; }
  .record-artist { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--groove); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-title { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-notes { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .record-meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 3px; background: var(--warm); color: var(--muted); }
  .delete-btn { background: none; border: none; cursor: pointer; color: var(--muted); opacity: 0; transition: opacity 0.15s; padding: 4px; font-size: 14px; flex-shrink: 0; }
  .record-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--label-red); }
  .empty-state { padding: 3rem 1.5rem; text-align: center; }
  .empty-state .big-disc { width: 80px; height: 80px; border-radius: 50%; background: var(--groove); margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; opacity: 0.15; }
  .empty-state .big-disc::after { content: ''; width: 16px; height: 16px; border-radius: 50%; background: var(--cream); }
  .empty-state p { color: var(--muted); font-size: 13px; line-height: 1.6; }
  .status-msg { font-size: 12px; padding: 0.625rem 1rem; border-radius: 6px; margin-bottom: 1rem; text-align: center; }
  .status-msg.success { background: #e8f5e9; color: #2e7d32; }
  .status-msg.error { background: #fdecea; color: #c62828; }
  .lookup-result { background: var(--warm); border-radius: 6px; padding: 0.875rem 1rem; margin-bottom: 1rem; font-size: 13px; display: flex; gap: 12px; align-items: center; }
  .lookup-cover { width: 52px; height: 52px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
  .lookup-text strong { display: block; font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--groove); }
  .lookup-text span { color: var(--muted); font-size: 12px; }
  .export-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; color: var(--muted); }
  .export-btn:hover { background: var(--warm); color: var(--ink); }
  .hidden { display: none !important; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(26,18,8,0.1); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen { padding: 3rem 1.5rem; text-align: center; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="record-icon"></div>
    <h1>The Catalogue</h1>
    <p class="subtitle">Your vinyl collection</p>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Connecting…</span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="total-count">—</div><div class="stat-label">Records</div></div>
    <div class="stat"><div class="stat-num" id="artist-count">—</div><div class="stat-label">Artists</div></div>
    <div class="stat"><div class="stat-num" id="country-count">—</div><div class="stat-label">Countries</div></div>
  </div>

  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#1a1208" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="#1a1208" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input type="text" id="search-input" placeholder="Search artist, title or notes…">
  </div>

  <div class="action-row">
    <button class="btn" id="btn-barcode"><span class="btn-icon">📷</span><span class="btn-label">Scan barcode</span></button>
    <button class="btn primary" id="btn-manual"><span class="btn-icon">✏️</span><span class="btn-label">Add manually</span></button>
  </div>

  <!-- Barcode panel -->
  <div class="panel hidden" id="barcode-panel">
    <div class="panel-header">Barcode scanner <button class="close-btn" id="close-barcode">×</button></div>
    <div class="panel-body">
      <!-- Manual barcode entry -->
      <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;">Enter barcode manually</div>
      <div class="barcode-input-row">
        <input type="text" id="manual-barcode" placeholder="e.g. 5099749408029" inputmode="numeric">
        <button class="barcode-lookup-btn" id="manual-barcode-btn">Look up</button>
      </div>
      <div class="barcode-divider">or scan with camera</div>
      <div id="scanner-status" class="scanner-status">Initialising camera…</div>
      <div id="scanner-wrap">
        <video id="scanner-video" autoplay playsinline muted></video>
        <div class="scanner-overlay"><div class="scanner-line"></div></div>
      </div>
      <div id="barcode-result" class="hidden"></div>
      <div id="barcode-form" class="hidden">
        <div class="form-row">
          <div class="form-group"><label>Country (optional)</label><input type="text" id="bc-country" placeholder="e.g. UK, US, DE"></div>
          <div class="form-group"><label>Edition (optional)</label><input type="text" id="bc-edition" placeholder="e.g. Original, Repress"></div>
        </div>
        <div class="form-group"><label>Notes (optional)</label><textarea id="bc-notes" placeholder="e.g. Tatsuro Yamashita, Japanese press, coloured vinyl…"></textarea></div>
        <button class="submit-btn" id="bc-save-btn">Add to catalogue</button>
      </div>
    </div>
  </div>

  <!-- Manual panel -->
  <div class="panel hidden" id="manual-panel" style="overflow:visible">
    <div class="panel-header">Add record manually <button class="close-btn" id="close-manual">×</button></div>
    <div class="panel-body" style="overflow:visible">
      <div class="form-group">
        <label>Artist *</label>
        <div class="ac-wrap">
          <input type="text" id="m-artist" placeholder="e.g. 山下達郎" autocomplete="off">
          <div class="ac-dropdown" id="artist-dropdown"></div>
        </div>
      </div>
      <div class="form-group"><label>Title *</label><input type="text" id="m-title" placeholder="e.g. For You"></div>
      <div class="form-row">
        <div class="form-group"><label>Country (optional)</label><input type="text" id="m-country" placeholder="e.g. JP"></div>
        <div class="form-group"><label>Edition (optional)</label><input type="text" id="m-edition" placeholder="e.g. Original"></div>
      </div>
      <div class="form-group"><label>Notes (optional)</label><textarea id="m-notes" placeholder="e.g. Tatsuro Yamashita — romanji, coloured vinyl, promo copy…"></textarea></div>
      <button class="submit-btn" id="manual-save-btn">Add to catalogue</button>
    </div>
  </div>

  <div id="status-area"></div>

  <div>
    <div class="sort-bar">
      <span id="list-label">Collection</span>
      <button class="sort-btn active" id="sort-alpha" title="Sort A–Z">A–Z</button>
      <button class="sort-btn" id="sort-recent" title="Sort by recently added">Recent</button>
      <button class="export-btn" id="export-btn">Export CSV</button>
    </div>
    <div class="panel" style="overflow:hidden">
      <div id="records-list">
        <div class="loading-screen"><span class="spinner"></span> Loading your collection…</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWakCy6WRWol9XiwxOe8aEAM_8LoaSxjIGa01upau9alkT2kAE-MPWPhfAHEFKttqf/exec';

var records     = [];
var barcodeData = null;
var codeReader  = null;
var scanning    = false;
var lastScanned = null;
var saving      = false;
var sortMode    = 'alpha'; // 'alpha' | 'recent'
var acOpen      = false;

function setSyncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot'+(state?' '+state:'');
  document.getElementById('sync-label').textContent = msg;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showStatus(msg, type) {
  var el = document.getElementById('status-area');
  el.innerHTML = '<div class="status-msg '+(type||'info')+'">'+esc(msg)+'</div>';
  setTimeout(function(){ el.innerHTML=''; }, 3500);
}
async function scriptCall(params) {
  var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
  var res = await fetch(SCRIPT_URL+(qs?'?'+qs:''));
  if (!res.ok) throw new Error('Request failed ('+res.status+')');
  var data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  setSyncStatus('busy','Connecting to Google Sheets…');
  try {
    var data = await scriptCall({});
    var rows = data.values||[];
    var hasHeader = rows.length>0&&rows[0][0]&&rows[0][0].toLowerCase()==='artist';
    var dataRows = hasHeader?rows.slice(1):rows;
    if (rows.length===0) await scriptCall({action:'append',row:JSON.stringify(['Artist','Title','Country','Edition','Notes'])});
    records = dataRows
      .map(function(r,i){ return {id:'r'+i,sheetRow:i,artist:r[0]||'',title:r[1]||'',country:r[2]||'',edition:r[3]||'',notes:r[4]||''}; })
      .filter(function(r){ return r.artist||r.title; });
    setSyncStatus('ok','Synced · '+records.length+' records');
    renderAll();
  } catch(e) {
    setSyncStatus('err','Connection failed: '+e.message);
    document.getElementById('records-list').innerHTML='<div class="empty-state"><div class="big-disc"></div><p>Could not connect.<br><small style="font-size:11px;color:var(--label-red)">'+esc(e.message)+'</small></p></div>';
  }
}

// ── Render ────────────────────────────────────────────────────
function renderAll(){ updateStats(); applySort(); }

function updateStats(){
  document.getElementById('total-count').textContent=records.length;
  var a={};records.forEach(function(r){a[r.artist.toLowerCase()]=1;});
  document.getElementById('artist-count').textContent=Object.keys(a).length;
  var c={};records.filter(function(r){return r.country;}).forEach(function(r){c[r.country]=1;});
  document.getElementById('country-count').textContent=Object.keys(c).length||'—';
}

function applySort(){
  var q = document.getElementById('search-input').value.toLowerCase().trim();
  var list = q ? records.filter(function(r){
    return r.artist.toLowerCase().indexOf(q)>=0
        || r.title.toLowerCase().indexOf(q)>=0
        || (r.notes&&r.notes.toLowerCase().indexOf(q)>=0);
  }) : records.slice();

  if (sortMode==='alpha') {
    list.sort(function(a,b){ return a.artist.toLowerCase().localeCompare(b.artist.toLowerCase())||a.title.toLowerCase().localeCompare(b.title.toLowerCase()); });
  }
  // 'recent' = insertion order (natural sheet order, already correct)

  var label = document.getElementById('list-label');
  label.textContent = q ? 'Results ('+list.length+')' : 'Collection';
  renderList(list);
}

function renderList(list){
  var el=document.getElementById('records-list');
  if(!list.length){
    var q=document.getElementById('search-input').value;
    el.innerHTML='<div class="empty-state"><div class="big-disc"></div><p>'+(q?'No records match your search.':'Your catalogue is empty.<br>Add your first record above.')+'</p></div>';
    return;
  }
  var cls=['c1','c2','c3','c4','c5'];
  el.innerHTML=list.map(function(r,i){
    return '<div class="record-item">'+
      '<div class="disc-icon '+cls[i%5]+'"></div>'+
      '<div class="record-info">'+
        '<div class="record-artist">'+esc(r.artist)+'</div>'+
        '<div class="record-title">'+esc(r.title)+'</div>'+
        (r.notes?'<div class="record-notes">'+esc(r.notes)+'</div>':'')+
        ((r.country||r.edition)?'<div class="record-meta">'+(r.country?'<span class="tag">'+esc(r.country)+'</span>':'')+(r.edition?'<span class="tag">'+esc(r.edition)+'</span>':'')+'</div>':'')+'</div>'+
      '<button class="delete-btn" data-id="'+r.id+'">✕</button></div>';
  }).join('');
  el.querySelectorAll('.delete-btn').forEach(function(b){ b.addEventListener('click',function(){ deleteRecord(this.dataset.id); }); });
}

// ── Search & Sort ─────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', applySort);

document.getElementById('sort-alpha').addEventListener('click',function(){
  sortMode='alpha';
  this.classList.add('active');
  document.getElementById('sort-recent').classList.remove('active');
  applySort();
});
document.getElementById('sort-recent').addEventListener('click',function(){
  sortMode='recent';
  this.classList.add('active');
  document.getElementById('sort-alpha').classList.remove('active');
  applySort();
});

// ── Artist autocomplete ───────────────────────────────────────
var acInput = document.getElementById('m-artist');
var acDrop  = document.getElementById('artist-dropdown');

function acMatches(q){
  var seen={},out=[];
  records.forEach(function(r){
    var k=r.artist.toLowerCase();
    if(r.artist&&!seen[k]&&k.indexOf(q.toLowerCase())===0){seen[k]=1;out.push(r.artist);}
  });
  return out.sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
}
function acShow(matches){
  if(!matches.length){acHide();return;}
  acDrop.innerHTML=matches.map(function(a){return '<div class="ac-item">'+esc(a)+'</div>';}).join('');
  acDrop.querySelectorAll('.ac-item').forEach(function(item){
    item.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});
    item.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();acSelect(this.textContent);});
    item.addEventListener('mousedown',function(e){e.preventDefault();acSelect(this.textContent);});
  });
  acDrop.classList.add('open'); acOpen=true;
}
function acHide(){ acDrop.classList.remove('open'); acOpen=false; }
function acSelect(val){ acInput.value=val; acHide(); document.getElementById('m-title').focus(); }

acInput.addEventListener('input',function(){ var q=this.value.trim(); if(!q){acHide();return;} acShow(acMatches(q)); });
acInput.addEventListener('focus',function(){ var q=this.value.trim(); if(q) acShow(acMatches(q)); });
acInput.addEventListener('blur',function(){ setTimeout(function(){ acHide(); },300); });
document.addEventListener('touchstart',function(e){ if(!acDrop.contains(e.target)&&e.target!==acInput) acHide(); },{passive:true});
document.addEventListener('mousedown',function(e){ if(!acDrop.contains(e.target)&&e.target!==acInput) acHide(); });
acInput.addEventListener('keydown',function(e){
  var items=acDrop.querySelectorAll('.ac-item');
  var active=acDrop.querySelector('.ac-item.highlighted');
  var idx=active?Array.prototype.indexOf.call(items,active):-1;
  if(e.key==='ArrowDown'){e.preventDefault();if(idx<items.length-1){if(active)active.classList.remove('highlighted');items[idx+1].classList.add('highlighted');}}
  else if(e.key==='ArrowUp'){e.preventDefault();if(idx>0){active.classList.remove('highlighted');items[idx-1].classList.add('highlighted');}}
  else if(e.key==='Enter'&&active){e.preventDefault();acSelect(active.textContent);}
  else if(e.key==='Escape'){acHide();}
});

// ── Add / Delete ──────────────────────────────────────────────
async function addRecord(artist,title,country,edition,notes){
  if(saving)return false;
  country=country||'';edition=edition||'';notes=notes||'';
  var dup=records.filter(function(r){return r.artist.toLowerCase()===artist.toLowerCase()&&r.title.toLowerCase()===title.toLowerCase();})[0];
  if(dup){showStatus('Already in catalogue: '+artist+' — '+title,'error');return false;}
  saving=true; setSyncStatus('busy','Saving…');
  try{
    await scriptCall({action:'append',row:JSON.stringify([artist,title,country,edition,notes])});
    records.push({id:'r'+records.length,sheetRow:records.length,artist:artist,title:title,country:country,edition:edition,notes:notes});
    setSyncStatus('ok','Synced · '+records.length+' records');
    renderAll(); saving=false; return true;
  }catch(e){saving=false;setSyncStatus('err','Save failed: '+e.message);showStatus('Could not save: '+e.message,'error');return false;}
}

async function deleteRecord(id){
  var idx=-1; records.forEach(function(r,i){if(r.id===id)idx=i;});
  if(idx===-1)return;
  var rec=records[idx];
  if(!confirm('Remove "'+rec.artist+' — '+rec.title+'"?'))return;
  setSyncStatus('busy','Removing…');
  try{
    await scriptCall({action:'delete',rowIndex:rec.sheetRow});
    records.splice(idx,1); records.forEach(function(r,i){r.id='r'+i;r.sheetRow=i;});
    setSyncStatus('ok','Synced · '+records.length+' records'); renderAll();
  }catch(e){setSyncStatus('err','Delete failed: '+e.message);showStatus('Could not remove — check connection.','error');}
}

// ── Manual save ───────────────────────────────────────────────
document.getElementById('manual-save-btn').addEventListener('click',async function(){
  var artist=document.getElementById('m-artist').value.trim();
  var title=document.getElementById('m-title').value.trim();
  var country=document.getElementById('m-country').value.trim();
  var edition=document.getElementById('m-edition').value.trim();
  var notes=document.getElementById('m-notes').value.trim();
  if(!artist||!title){showStatus('Artist and title are required.','error');return;}
  var ok=await addRecord(artist,title,country,edition,notes);
  if(ok){
    showStatus('Added: '+artist+' — '+title,'success');
    ['m-artist','m-title','m-country','m-edition','m-notes'].forEach(function(id){document.getElementById(id).value='';});
    acHide(); closePanel('manual-panel');
  }
});

// ── Panels ────────────────────────────────────────────────────
function togglePanel(id){
  var panel=document.getElementById(id);
  var isHidden=panel.classList.contains('hidden');
  ['barcode-panel','manual-panel'].forEach(function(p){document.getElementById(p).classList.add('hidden');});
  if(isHidden){panel.classList.remove('hidden');if(id==='barcode-panel')startScanner();}
  else{if(id==='barcode-panel')stopScanner();}
}
function closePanel(id){
  document.getElementById(id).classList.add('hidden');
  if(id==='barcode-panel')stopScanner();
}
document.getElementById('btn-barcode').addEventListener('click',function(){togglePanel('barcode-panel');});
document.getElementById('btn-manual').addEventListener('click',function(){togglePanel('manual-panel');});
document.getElementById('close-barcode').addEventListener('click',function(){closePanel('barcode-panel');});
document.getElementById('close-manual').addEventListener('click',function(){closePanel('manual-panel');});

// ── Manual barcode lookup ─────────────────────────────────────
document.getElementById('manual-barcode-btn').addEventListener('click',function(){
  var code=document.getElementById('manual-barcode').value.trim();
  if(!code){showStatus('Enter a barcode number first.','error');return;}
  stopScanner(); // stop camera if running
  lookupBarcode(code);
});
document.getElementById('manual-barcode').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ document.getElementById('manual-barcode-btn').click(); }
});

// ── Scanner ───────────────────────────────────────────────────
function startScanner(){
  scanning=true;lastScanned=null;barcodeData=null;
  document.getElementById('barcode-result').classList.add('hidden');
  document.getElementById('barcode-form').classList.add('hidden');
  document.getElementById('scanner-status').textContent='Requesting camera…';
  try{
    codeReader=new ZXing.BrowserMultiFormatReader();
    codeReader.listVideoInputDevices().then(function(devices){
      var deviceId;
      devices.forEach(function(d){var l=d.label.toLowerCase();if(l.indexOf('back')>=0||l.indexOf('rear')>=0||l.indexOf('environment')>=0)deviceId=d.deviceId;});
      if(!deviceId&&devices.length>0)deviceId=devices[devices.length-1].deviceId;
      navigator.mediaDevices.getUserMedia({video:{deviceId:deviceId?{exact:deviceId}:undefined,facingMode:deviceId?undefined:{ideal:'environment'},width:{ideal:1280},height:{ideal:720},advanced:[{focusMode:'continuous'}]}}).then(function(stream){
        var video=document.getElementById('scanner-video');
        video.srcObject=stream;
        var track=stream.getVideoTracks()[0];
        if(track&&track.applyConstraints)track.applyConstraints({advanced:[{focusMode:'continuous'}]}).catch(function(){});
        video.play().then(function(){
          document.getElementById('scanner-status').textContent='Point at the barcode…';
          codeReader.decodeFromStream(stream,video,function(result){
            if(!result||!scanning)return;
            var code=result.getText();
            if(code===lastScanned)return;
            lastScanned=code;scanning=false;codeReader.reset();lookupBarcode(code);
          });
        });
      }).catch(function(err){document.getElementById('scanner-status').textContent='Camera error: '+(err.message||'permission denied');scanning=false;});
    }).catch(function(err){document.getElementById('scanner-status').textContent='Camera error: '+(err.message||'permission denied');scanning=false;});
  }catch(err){document.getElementById('scanner-status').textContent='Scanner unavailable — enter barcode manually above.';scanning=false;}
}

function stopScanner(){
  scanning=false;lastScanned=null;
  if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}
  var v=document.getElementById('scanner-video');
  if(v&&v.srcObject){v.srcObject.getTracks().forEach(function(t){t.stop();});v.srcObject=null;}
}

async function lookupBarcode(code){
  var s=document.getElementById('scanner-status');
  s.innerHTML='<span class="spinner"></span> Looking up '+code+'…';
  document.getElementById('barcode-result').classList.add('hidden');
  document.getElementById('barcode-form').classList.add('hidden');
  try{
    var res=await fetch('https://api.discogs.com/database/search?barcode='+code,{headers:{'User-Agent':'VinylCatalogue/1.0'}});
    var data=await res.json();
    if(data.results&&data.results.length>0){
      var top=data.results[0];
      var parts=(top.title||'').split(' - ');
      var artist=parts[0]||'';
      var title=parts.slice(1).join(' - ')||top.title||'';
      var cover=(top.cover_image&&top.cover_image.indexOf('spacer')===-1)?top.cover_image:'';
      barcodeData={artist:artist,title:title};
      var re=document.getElementById('barcode-result');
      re.className='lookup-result';
      re.innerHTML=(cover?'<img class="lookup-cover" src="'+esc(cover)+'" alt="" onerror="this.style.display=\'none\'">':'')+
        '<div class="lookup-text"><strong>'+esc(artist)+' — '+esc(title)+'</strong><span>via Discogs · '+code+'</span></div>';
      re.classList.remove('hidden');
      document.getElementById('barcode-form').classList.remove('hidden');
      s.textContent='Found! Add optional details below.';
    }else{
      s.textContent='Barcode not found — try entering manually above or add the record manually.';
    }
  }catch(e){
    s.textContent='Lookup failed — check your connection.';
  }
}

document.getElementById('bc-save-btn').addEventListener('click',async function(){
  if(!barcodeData||typeof barcodeData!=='object')return;
  var country=document.getElementById('bc-country').value.trim();
  var edition=document.getElementById('bc-edition').value.trim();
  var notes=document.getElementById('bc-notes').value.trim();
  var ok=await addRecord(barcodeData.artist,barcodeData.title,country,edition,notes);
  if(ok){
    showStatus('Added: '+barcodeData.artist+' — '+barcodeData.title,'success');
    document.getElementById('bc-country').value='';
    document.getElementById('bc-edition').value='';
    document.getElementById('bc-notes').value='';
    document.getElementById('manual-barcode').value='';
    barcodeData=null; closePanel('barcode-panel');
  }
});

// ── Export CSV ────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click',function(){
  if(!records.length){showStatus('Nothing to export yet.','error');return;}
  var rows=[['Artist','Title','Country','Edition','Notes']].concat(records.map(function(r){return[r.artist,r.title,r.country||'',r.edition||'',r.notes||''];}));
  var csv=rows.map(function(r){return r.map(function(c){return'"'+c.replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='vinyl_catalogue.csv';a.click();
});

init();
</script>
